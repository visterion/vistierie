name: test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  checks: write
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: maven
      - name: Run tests with coverage
        working-directory: java-server
        run: ./mvnw -B -ntp verify -Dmaven.test.failure.ignore=true
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: java-server/target/site/jacoco/jacoco.xml
          fail_ci_if_error: false
      - name: Upload JaCoCo report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: java-server/target/site/jacoco
          retention-days: 14
      - name: Publish JUnit results
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: 'java-server/target/surefire-reports/TEST-*.xml'
          fail_on_failure: true
          require_tests: true
