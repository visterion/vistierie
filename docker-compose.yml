services:
  db:
    image: postgres:17-alpine
    container_name: vistierie-db
    environment:
      POSTGRES_DB: vistierie
      POSTGRES_USER: vistierie
      POSTGRES_PASSWORD: ${VISTIERIE_DB_PASSWORD:?VISTIERIE_DB_PASSWORD required}
    volumes:
      - vistierie-pgdata:/var/lib/postgresql/data
    networks:
      - vistierie-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "vistierie"]
      interval: 5s
      timeout: 5s
      retries: 10

  vistierie:
    image: ${VISTIERIE_IMAGE:-ghcr.io/visterion/vistierie:main}
    container_name: vistierie
    ports:
      - "${VISTIERIE_PORT:-8090}:8090"
    environment:
      VISTIERIE_DB_URL: jdbc:postgresql://db:5432/vistierie
      VISTIERIE_DB_USER: vistierie
      VISTIERIE_DB_PASSWORD: ${VISTIERIE_DB_PASSWORD:?VISTIERIE_DB_PASSWORD required}
      VISTIERIE_ADMIN_TOKEN_HASH: ${VISTIERIE_ADMIN_TOKEN_HASH:?VISTIERIE_ADMIN_TOKEN_HASH required}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY required}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      CLAUDE_SUBSCRIPTION_ENABLED: ${CLAUDE_SUBSCRIPTION_ENABLED:-false}
      CLAUDE_BRIDGE_URL: ${CLAUDE_BRIDGE_URL:-http://claude-bridge:8091}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - vistierie-net
      - hivemem-net
    restart: unless-stopped

  claude-bridge:
    image: ${CLAUDE_BRIDGE_IMAGE:-ghcr.io/visterion/vistierie-claude-bridge:main}
    container_name: claude-bridge
    profiles: ["subscription"]
    environment:
      # cannot be :?-required — compose interpolates even with the profile
      # inactive, which would break token-less deployments
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
    networks:
      - vistierie-net
    restart: unless-stopped

networks:
  vistierie-net:
  hivemem-net:
    external: true

volumes:
  vistierie-pgdata:
