spring:
  application:
    name: vistierie
  datasource:
    url: ${VISTIERIE_DB_URL:jdbc:postgresql://localhost:5432/vistierie}
    username: ${VISTIERIE_DB_USER:vistierie}
    password: ${VISTIERIE_DB_PASSWORD:vistierie}
  flyway:
    enabled: true
    default-schema: vistierie
    create-schemas: true
    schemas: vistierie

server:
  port: 8090

vistierie:
  admin:
    token-hash: ${VISTIERIE_ADMIN_TOKEN_HASH:}
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
    base-url: https://api.anthropic.com
    timeout-seconds: 60
  providers:
    openai:
      base-url: https://api.openai.com/v1
      api-key: ${OPENAI_API_KEY:}
      timeout-seconds: 60
    xai:
      base-url: https://api.x.ai/v1
      api-key: ${XAI_API_KEY:}
      timeout-seconds: 60
  mock-llm: ${VISTIERIE_MOCK_LLM:false}
  audit:
    body-retention-days: 7

