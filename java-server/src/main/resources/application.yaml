spring:
  application:
    name: vistierie
  datasource:
    url: ${VISTIERIE_DB_URL:jdbc:postgresql://localhost:5432/vistierie}
    username: ${VISTIERIE_DB_USER:vistierie}
    password: ${VISTIERIE_DB_PASSWORD:vistierie}
  flyway:
    enabled: true
    default-schema: vistierie
    create-schemas: true
    schemas: vistierie

server:
  port: 8090

vistierie:
  admin:
    token-hash: ${VISTIERIE_ADMIN_TOKEN_HASH:}
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
    base-url: https://api.anthropic.com
    timeout-seconds: 60
  mock-llm: ${VISTIERIE_MOCK_LLM:false}
  routing:
    config-path: classpath:routing.yaml

routing:
  tenants:
    hivemem:
      default:
        provider: anthropic
        model: claude-sonnet-4-6
        allow-override: false
      purposes:
        summarize_cell:
          provider: anthropic
          model: claude-haiku-4-5
          allow-override: false
        vision_attachment:
          provider: anthropic
          model: claude-haiku-4-5
          allow-override: false
        vision_diagram:
          provider: anthropic
          model: claude-sonnet-4-6
          allow-override: false
        free_pick:
          provider: anthropic
          model: claude-sonnet-4-6
          allow-override: true
