# Profile-specific overrides for tests running with the stub LLM provider
# (@ActiveProfiles("test-stub-llm")). Zero the mcp tool retry backoff so
# e2e tests exercising a failing mcp tool call terminate immediately instead
# of sleeping through the production 1s/2s/4s exponential backoff (~7s).
vistierie.agents.mcp-retry-base-millis=0
