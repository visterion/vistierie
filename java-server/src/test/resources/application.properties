# Test-only overrides. Loaded on top of src/main/resources/application.yaml.
# Cap connection-pool size so each @SpringBootTest context only uses a couple
# of Postgres connections; with many context variants a default pool of 10
# can exhaust the testcontainer's max_connections.
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=0
# Push the batch poller out of the way during tests; integration tests that
# care about it override this property explicitly via @SpringBootTest.
vistierie.agents.batch.poll-millis=600000
